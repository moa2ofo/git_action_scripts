name: Build Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - .github/workflows/build-docker-image.yml

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout git_action_scripts
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image locally for validation
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          no-cache: true
          tags: |
            llvm-c-parser:test

      - name: Debug image tools
        run: |
          set -eux

          docker image inspect llvm-c-parser:test

          docker run --rm llvm-c-parser:test bash -lc '
            set -eux

            echo "=== OS ==="
            cat /etc/os-release

            echo "=== Doxygen ==="
            which doxygen
            doxygen --version

            echo "=== Graphviz ==="
            which dot
            dot -V

            echo "=== PlantUML ==="
            which plantuml
            plantuml -version || true

            echo "=== Python ==="
            python3 --version

            echo "=== Clang ==="
            clang --version

            echo "=== libclang ==="
            python3 -c '"'"'import clang.cindex; print("clang Python bindings OK"); print(clang.cindex.Config.library_path)'"'"'

            echo "=== Cppcheck ==="
            cppcheck --version

            echo "=== Java ==="
            java -version
          '

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          no-cache: true
          tags: |
            ghcr.io/moa2ofo/git_action_scripts/llvm-c-parser:latest
            ghcr.io/moa2ofo/git_action_scripts/llvm-c-parser:${{ github.sha }}

